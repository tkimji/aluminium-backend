name: CD Node API

# Manual: GitHub → Actions → "CD Node API" → Run workflow
on:
  workflow_dispatch:

env:
  PM2_APP_NAME: node-api
  APP_PORT: "3000"

jobs:
  deploy-node-api:
    name: Build & deploy Node API
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Build TypeScript
        run: npm run build

      - name: Deploy Node API bundle to VPS (SCP)
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          # DB/ dumps (case-sensitive on Linux); db/** for lowercase clones; .backup alongside .sql
          source: "dist/*,package.json,prisma,DB/**/*.sql,DB/**/*.backup,db/**/*.sql,db/**/*.backup,scripts/**/*.sql,scripts/**/*.backup,*.sql,*.backup"
          target: ${{ secrets.VPS_BACKEND_PATH }}

      - name: Install deps, Prisma generate & restart Node API (PM2)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          script_stop: true
          script: |
            cd ${{ secrets.VPS_BACKEND_PATH }}
            npm install --omit=dev
            npx prisma generate

            pm2 stop ${{ env.PM2_APP_NAME }} 2>/dev/null || true
            pm2 stop aluminium-backend 2>/dev/null || true
            fuser -k ${{ env.APP_PORT }}/tcp 2>/dev/null || true
            npx --yes kill-port ${{ env.APP_PORT }} 2>/dev/null || true

            if pm2 describe ${{ env.PM2_APP_NAME }} > /dev/null 2>&1; then
              pm2 restart ${{ env.PM2_APP_NAME }} --update-env
            else
              pm2 start dist/server.js --name ${{ env.PM2_APP_NAME }}
            fi

            pm2 save
